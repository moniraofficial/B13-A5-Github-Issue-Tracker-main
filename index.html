<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .border-open { border-top: 5px solid #22c55e !important; }
        .border-closed { border-top: 5px solid #a855f7 !important; }
    </style>
</head>
<body class="bg-base-200 min-h-screen font-sans">
<!-- login details -->
    <section id="login-section" class="flex flex-col items-center justify-center min-h-screen px-4">
        <div class="card w-full max-w-sm bg-base-100 shadow-2xl p-8">
            <div class="flex flex-col items-center mb-6">
                <div >
                    <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="Logo" class="w-20 h-20 mb-4">
            
                </div>
                <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
                <p class="text-sm opacity-60">Sign in to manage your issues</p>
            </div>
            
            <div class="form-control w-full">
                <label class="label"><span class="label-text">Username</span></label>
                <input type="text" id="username" placeholder="Enter Username" class="input input-bordered w-full" />
                <p class="text-[12px] text-blue-600 font-medium">Dafualt: admin</p>
            </div>
            <div class="form-control w-full mt-2">
                <label class="label"><span class="label-text">Password</span></label>
                <input type="password" id="password" placeholder="Enter Password" class="input input-bordered w-full" />
                <p class="text-[12px] text-blue-600 font-medium">Dafualt: admin123</p>
            </div>
            
            <button onclick="handleLogin()" class="btn btn-primary w-full mt-6">Sign In</button>
           
<!-- or section -->
    <div class="flex items-center my-6">
    <div class="flex-grow border-t border-gray-300"></div>
    <span class="flex-shrink mx-4 text-gray-400 text-sm font-medium uppercase tracking-wider">OR</span>
    <div class="flex-grow border-t border-gray-300"></div>
    </div>
            <div class="rounded-lg text-xs text-center">
                <p class="py-2"><strong>Demo Credential:</strong></p>
            </div>
            <div class="py-2 text-center bg-blue-50 border-blue-100">
                <p><span class="font-bold">Username:</span> admin</p>
                <p><span class="font-bold">Password:</span> admin123</p>
            </div>

        </div>

    </section>

    <section id="main-section" class="hidden">
     <div class="navbar bg-white border-b border-gray-100 shadow-sm px-4 lg:px-20 py-4 items-center">
        <div class="flex-1 flex items-center gap-2">
            <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="Logo" class="w-8 h-8 items-center">
            <a class="text-xl font-bold text-Black-600">GitHub Issues Tracker</a>
        </div>

        <div class="flex-none gap-4">
            <div class="join">
                <input type="text" id="searchInput" placeholder="Search issues..." 
                       class="input input-bordered join-item w-32 md:w-64 focus:outline-blue-600 bg-gray-50 border-gray-200" />
                <button onclick="handleSearch()" class="btn btn-primary join-item bg-blue-600 border-none px-6">
                    Search
                </button>
            </div>

            <button class="btn btn-success gap-2 text-white bg-blue-500 border-none hover:bg-blue-600 shadow-md">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                <span class="hidden sm:inline">New Issue</span>
            </button>
        </div>
    </div>

    <main class="max-w-7xl mx-auto p-4 md:p-10">
        


        <div class="mb-8">
    <div class="flex flex-col md:flex-row justify-between items-center gap-4 mx-auto bg-white p-4 rounded-xl shadow-sm border border-gray-100">
        <div role="tablist" class="w-full tabs-boxed bg-white p-1 border border-gray-200">
            <button role="tab" class="tab tab-active px-6" onclick="filterByStatus('all', this)">All Issues</button>
            <button role="tab" class="tab px-6" onclick="filterByStatus('open', this)">Open</button>
            <button role="tab" class="tab px-6" onclick="filterByStatus('closed', this)">Closed</button>
        </div>
    </div>

    <!-- >>>>>>>>>>> -->
 <div class="mt-2 flex items-center gap-4 mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
    <div class="w-10 h-10 rounded-full bg-purple-50 flex items-center justify-center">
        <img src="./assets/Aperture.png" class="w-6 h-6" alt="logo">
    </div>

    <div class="flex-1">
        <h3 class="text-xl font-bold leading-tight">
            <span id="total-issue-count">0</span> Issues
        </h3>
        <p class="text-[11px] opacity-80 font-medium text-slate-500">
            Track and manage your project issues
        </p>
    </div>

    <div class="flex gap-4 text-xs font-bold uppercase tracking-wider">
        <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-green-500"></span>
            <span class="text-slate-600">Open</span>
        </div>
        <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-purple-500"></span>
            <span class="text-slate-600">Closed</span>
        </div>
    </div>
</div>
           

        <div id="loading-spinner" class="hidden flex flex-col items-center justify-center py-20">
            <span class="loading loading-bars loading-lg text-blue-600"></span>
            <p class="mt-4 text-xs font-bold uppercase tracking-widest text-gray-400 animate-pulse">Fetching issues...</p>
        </div>

        <div id="issue-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </main>

    </section>

   <dialog id="issue_modal" class="modal">

    <div class="modal-box max-w-2xl p-0 overflow-hidden rounded-2xl">
    <form method="dialog">
      <button class="btn btn-sm btn-circle btn-ghost absolute right-4 top-4">✕</button>
    </form>

    <div id="modal-body" class="p-10">
        </div>
    
  </div>

   </dialog>



    <script src="./script.js"></script>
</body>
</html>
